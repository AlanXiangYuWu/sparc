# RMHA训练配置文件

# 环境配置
env:
  name: "MRPP"
  num_robots: 8                    # 训练时机器人数量
  grid_size_range: [10, 40]        # 网格大小范围
  obstacle_density_range: [0.0, 0.5]  # 障碍物密度范围 (三角分布，峰值0.33)
  obstacle_density_peak: 0.33      # 障碍物密度分布峰值
  fov_size: 3                      # 视野范围 (3x3)
  max_episode_steps: 256           # 最大回合步数
  action_space: 5                  # 动作数量 (上/下/左/右/停留)
  
  # 奖励设置
  rewards:
    move: -0.3                     # 移动惩罚
    stay_on_goal: 0.0              # 在目标上停留
    stay_off_goal: -0.3            # 不在目标停留
    collision: -2.0                # 碰撞惩罚
    blocking: -1.0                 # 阻塞惩罚
    reach_goal: 0.0                # 到达目标奖励

# 模型配置
model:
  name: "RMHA"
  
  # 编码器配置
  encoder:
    conv_channels: [8, 16, 32, 64, 64, 32, 16]  # CNN通道数
    conv_kernels: [3, 3, 3, 3, 3, 3, 3]         # 卷积核大小
    pool_layers: [2, 4]                          # 池化层位置
    fc_dims: [256, 256, 256]                     # 全连接层维度
    lstm_hidden_dim: 256                         # LSTM隐藏维度
    
  # RMHA通信模块配置
  communication:
    hidden_dim: 256                              # 隐藏层维度
    num_heads: 4                                 # 注意力头数
    num_layers: 3                                # Transformer层数
    dropout: 0.0                                 # Dropout率 (论文中移除)
    use_gru: true                                # 是否使用GRU门控
    distance_embedding_dim: 64                   # 距离嵌入维度
    comm_radius: 40                              # 通信半径 (曼哈顿距离)
    use_distance_encoding: true                  # 是否使用距离编码
    
  # 策略和价值网络配置
  policy:
    hidden_dims: [256, 128]                      # 策略网络隐藏层
    activation: "relu"
    
  value:
    hidden_dims: [256, 128]                      # 价值网络隐藏层
    activation: "relu"

# MAPPO算法配置
algorithm:
  name: "MAPPO"
  
  # PPO参数
  lr: 3.0e-4                                     # 学习率
  gamma: 0.99                                    # 折扣因子
  gae_lambda: 0.95                               # GAE参数
  clip_param: 0.2                                # PPO裁剪参数
  value_loss_coef: 0.5                           # 价值损失系数
  entropy_coef: 0.01                             # 熵损失系数
  max_grad_norm: 0.5                             # 梯度裁剪
  
  # 训练参数
  num_steps: 256                                 # 每次更新的步数
  num_mini_batch: 8                              # 小批次数量
  ppo_epoch: 4                                   # PPO更新轮数
  
  # 内在奖励参数 (用于探索)
  use_intrinsic_reward: true
  intrinsic_reward:
    tau: 2.0                                     # 距离阈值
    phi: 0.1                                     # 内在奖励系数
    beta: 0.01                                   # 衰减系数
    buffer_size: 10                              # episode buffer大小

# 训练配置
training:
  total_timesteps: 100000                    # 总训练步数
  num_envs: 32                                   # 并行环境数量
  seed: 42                                       # 随机种子
  device: "cuda"                                 # 设备 (cuda/cpu)
  
  # 日志和保存
  log_interval: 10                               # 日志记录间隔 (episodes)
  save_interval: 100                             # 模型保存间隔 (episodes)
  eval_interval: 50                              # 评估间隔 (episodes)
  eval_episodes: 10                              # 评估episode数量
  
  # 检查点
  checkpoint_dir: "results/checkpoints"
  log_dir: "results/logs"
  save_best: true                                # 是否保存最佳模型
  
  # TensorBoard/WandB
  use_tensorboard: true
  use_wandb: false
  wandb_project: "RMHA_MRPP"
  wandb_entity: null

# 消融实验配置
ablation:
  # 是否进行消融实验
  run_ablation: false
  
  # 消融实验变体
  variants:
    - name: "MAPPO"
      use_communication: false
      use_distance_encoding: false
      
    - name: "MAPPO_GNN"
      use_communication: true
      use_distance_encoding: false
      
    - name: "RMHA"
      use_communication: true
      use_distance_encoding: true

# 优化配置
optimization:
  # 混合精度训练
  use_amp: false
  
  # 梯度累积
  gradient_accumulation_steps: 1
  
  # 学习率调度
  use_lr_scheduler: true
  lr_scheduler:
    type: "cosine"                               # linear/cosine/constant
    warmup_steps: 10000
    
  # 优化器
  optimizer: "adam"
  adam_eps: 1.0e-5
  weight_decay: 0.0

# 数据增强和正则化
regularization:
  use_layer_norm: true                           # 使用层归一化
  use_residual: true                             # 使用残差连接
  clip_observation: true                         # 裁剪观测值
  normalize_advantage: true                      # 归一化优势函数
  normalize_observation: false                   # 归一化观测
  normalize_reward: false                        # 归一化奖励

