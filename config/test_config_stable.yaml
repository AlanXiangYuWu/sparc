# RMHA测试配置文件（基于稳定训练配置）
# 与 train_config_stable.yaml 配套使用

# 测试环境配置（与训练配置保持一致）
env:
  name: "MRPP"
  num_robots: 2                    # 与训练配置一致（2个机器人）
  grid_size_range: [6, 8]         # 与训练配置一致（6-8网格）
  obstacle_density_range: [0.0, 0.05]  # 与训练配置一致（0-5%障碍物）
  obstacle_density_peak: 0.02     # 与训练配置一致
  fov_size: 3                      # 与训练配置一致
  max_episode_steps: 400           # 与训练配置一致
  
  # 奖励设置（与训练配置一致）
  rewards:
    move: 0.0
    stay_on_goal: 5.0
    stay_off_goal: 0.0
    collision: -0.1
    blocking: -0.05
    reach_goal: 10.0
    distance_reward: 0.2
    proximity_reward: 0.1
    success_bonus: 50.0
  
  # 测试场景配置（多个难度级别）
  test_scenarios:
    - name: "easy"                 # 简单场景（与训练一致）
      obstacle_density: 0.0
      grid_size: 6
      num_maps: 50                 # 每个场景测试地图数量
      
    - name: "medium"               # 中等场景
      obstacle_density: 0.02
      grid_size: 7
      num_maps: 50
      
    - name: "hard"                 # 困难场景
      obstacle_density: 0.05
      grid_size: 8
      num_maps: 50

# 模型配置（需要与训练配置一致）
model:
  # 模型结构（必须与训练配置一致）
  encoder:
    conv_channels: [8, 16]
    conv_kernels: [3, 3]
    pool_layers: []
    fc_dims: [128]
    lstm_hidden_dim: 128
    
  communication:
    hidden_dim: 128
    num_heads: 2
    num_layers: 2
    dropout: 0.0
    use_gru: true
    distance_embedding_dim: 32
    comm_radius: 15
    use_distance_encoding: true
    
  policy:
    hidden_dims: [128, 64]
    activation: "relu"
    
  value:
    hidden_dims: [128, 64]
    activation: "relu"
  
  # 检查点路径（默认路径，可通过命令行参数覆盖）
  checkpoint_path: "results/checkpoints/rmha_seed42/rmha_best.pth"
  device: "cuda"

# 测试配置
testing:
  # 基本设置
  seed: 123                        # 测试随机种子
  deterministic: true              # 确定性测试（使用确定性策略）
  render: false                    # 是否渲染
  save_trajectories: true          # 是否保存轨迹
  
  # 评估指标
  metrics:
    - "success_rate"               # 成功率
    - "max_reached"                # 最大目标达成数
    - "collision_rate"             # 碰撞率
    - "avg_episode_length"         # 平均episode长度
    - "makespan"                   # 完成时间
    - "sum_of_costs"               # 总成本
    - "avg_reward"                 # 平均奖励
    
  # 输出配置
  output_dir: "results/data"
  save_detailed_results: true      # 保存详细结果
  save_statistics: true            # 保存统计信息
  
# 可视化配置
visualization:
  enabled: true
  output_dir: "results/figures"
  
  # 轨迹可视化
  trajectory:
    save_images: true              # 保存图片
    save_video: false              # 保存视频（测试时通常不需要）
    fps: 10                        # 视频帧率
    dpi: 150                       # 图片分辨率
    
  # 图表配置
  plots:
    figsize: [10, 6]
    style: "seaborn"
    colors: ["#1f77b4", "#ff7f0e", "#2ca02c", "#d62728", "#9467bd"]


