# RMHA中等难度训练配置文件
# 在简单配置基础上逐步增加难度

# 环境配置（中等难度）
env:
  name: "MRPP"
  num_robots: 4                    # 增加到4个机器人
  grid_size_range: [10, 20]       # 中等网格大小
  obstacle_density_range: [0.0, 0.3]  # 中等障碍物密度（0-30%）
  obstacle_density_peak: 0.15      # 中等峰值（15%）
  fov_size: 3
  max_episode_steps: 200           # 中等最大步数
  action_space: 5
  
  # 奖励设置
  rewards:
    move: -0.2                     # 中等移动惩罚
    stay_on_goal: 1.0
    stay_off_goal: -0.2
    collision: -1.5                # 中等碰撞惩罚
    blocking: -0.8
    reach_goal: 5.0

# 模型配置（中等）
model:
  name: "RMHA"
  
  encoder:
    conv_channels: [8, 16, 32, 64]  # 4层CNN
    conv_kernels: [3, 3, 3, 3]
    pool_layers: []
    fc_dims: [256, 256]
    lstm_hidden_dim: 256
    
  communication:
    hidden_dim: 256
    num_heads: 4
    num_layers: 3
    dropout: 0.0
    use_gru: true
    distance_embedding_dim: 64
    comm_radius: 30
    use_distance_encoding: true
    
  policy:
    hidden_dims: [256, 128]
    activation: "relu"
    
  value:
    hidden_dims: [256, 128]
    activation: "relu"

# MAPPO算法配置
algorithm:
  name: "MAPPO"
  
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_param: 0.2
  value_loss_coef: 0.5
  entropy_coef: 0.03
  max_grad_norm: 0.5
  
  num_steps: 200
  num_mini_batch: 8
  ppo_epoch: 4
  
  use_intrinsic_reward: true
  intrinsic_reward:
    tau: 1.5
    phi: 0.15
    beta: 0.01
    buffer_size: 8

# 训练配置
training:
  total_timesteps: 2000000         # 200万步
  num_envs: 1
  seed: 42
  device: "cuda"
  
  log_interval: 10
  save_interval: 100
  eval_interval: 50
  eval_episodes: 10
  
  checkpoint_dir: "results/checkpoints"
  log_dir: "results/logs"
  save_best: true
  
  use_tensorboard: true
  use_wandb: false

# 优化配置
optimization:
  use_amp: false
  gradient_accumulation_steps: 1
  use_lr_scheduler: true
  lr_scheduler:
    type: "cosine"
    warmup_steps: 10000
  optimizer: "adam"
  adam_eps: 1.0e-5
  weight_decay: 0.0

regularization:
  use_layer_norm: true
  use_residual: true
  clip_observation: true
  normalize_advantage: true
  normalize_observation: false
  normalize_reward: false

