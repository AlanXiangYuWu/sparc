# RMHA测试配置文件

# 测试环境配置
env:
  name: "MRPP"
  num_robots: 128                  # 测试时机器人数量
  grid_size: 40                    # 固定网格大小
  fov_size: 3                      # 视野范围
  max_episode_steps: 256           # 最大回合步数
  
  # 测试场景配置
  test_scenarios:
    - name: "low_density"
      obstacle_density: 0.0
      num_maps: 100                # 每个场景测试地图数量
      
    - name: "medium_density"
      obstacle_density: 0.15
      num_maps: 100
      
    - name: "high_density"
      obstacle_density: 0.30
      num_maps: 100

# 模型配置 (需要与训练配置一致)
model:
  checkpoint_path: "results/checkpoints/rmha_best.pth"
  device: "cuda"

# 测试配置
testing:
  # 基本设置
  seed: 123                        # 测试随机种子
  deterministic: true              # 确定性测试
  render: false                    # 是否渲染
  save_trajectories: true          # 是否保存轨迹
  
  # 评估指标
  metrics:
    - "success_rate"               # 成功率
    - "max_reached"                # 最大目标达成数
    - "collision_rate"             # 碰撞率
    - "avg_episode_length"         # 平均episode长度
    - "makespan"                   # 完成时间
    - "sum_of_costs"               # 总成本
    
  # 输出配置
  output_dir: "results/data"
  save_detailed_results: true      # 保存详细结果
  save_statistics: true            # 保存统计信息
  
# 可视化配置
visualization:
  enabled: true
  output_dir: "results/figures"
  
  # 轨迹可视化
  trajectory:
    save_images: true              # 保存图片
    save_video: true               # 保存视频
    fps: 10                        # 视频帧率
    dpi: 150                       # 图片分辨率
    
  # 图表配置
  plots:
    figsize: [10, 6]
    style: "seaborn"
    colors: ["#1f77b4", "#ff7f0e", "#2ca02c", "#d62728", "#9467bd"]
    
# 对比实验配置
comparison:
  # 需要对比的算法
  algorithms:
    - name: "RMHA"
      checkpoint: "results/checkpoints/rmha_best.pth"
      
    - name: "SCRIMP"
      checkpoint: "results/checkpoints/scrimp_best.pth"
      
    - name: "DHC"
      checkpoint: "results/checkpoints/dhc_best.pth"
      
    - name: "PICO"
      checkpoint: "results/checkpoints/pico_best.pth"
      
    - name: "MAPPO"
      checkpoint: "results/checkpoints/mappo_best.pth"
      
    - name: "MAPPO_GNN"
      checkpoint: "results/checkpoints/mappo_gnn_best.pth"
  
  # 统计显著性测试
  statistical_test:
    enabled: true
    method: "t-test"               # t-test/mann-whitney
    alpha: 0.05                    # 显著性水平

