# RMHA论文标准配置
# 严格按照论文中的设置

# 环境配置（论文标准）
env:
  name: "MRPP"
  num_robots: 8                    # 论文标准：8个机器人（训练）
  grid_size_range: [10, 40]        # 论文标准：10-40随机
  obstacle_density_range: [0.0, 0.5]  # 论文标准：0-50%三角分布
  obstacle_density_peak: 0.33      # 论文标准：峰值33%
  fov_size: 3                      # 论文标准：3×3 FOV
  max_episode_steps: 256           # 论文标准：256步
  action_space: 5
  
  # 奖励设置（严格按照论文表3）
  rewards:
    move: -0.3                     # 论文：移动惩罚 -0.3
    stay_on_goal: 0.0              # 论文：在目标停留 0.0
    stay_off_goal: -0.3            # 论文：不在目标停留 -0.3
    collision: -2.0                # 论文：碰撞 -2
    blocking: -1.0                 # 论文：阻塞 -1
    reach_goal: 0.0                # 论文中没有明确，设为0
    distance_reward: 0.0            # 论文中没有，但可以添加帮助学习

# 模型配置（论文标准）
model:
  name: "RMHA"
  
  # 编码器配置（论文317-330行）
  encoder:
    conv_channels: [8, 16, 32, 64, 64, 32, 16]  # 7层CNN
    conv_kernels: [3, 3, 3, 3, 3, 3, 3]
    pool_layers: [2, 4]                          # 2层池化
    fc_dims: [256, 256, 256]                     # 3个全连接层
    lstm_hidden_dim: 256                         # LSTM隐藏维度
    
  # RMHA通信模块配置（论文公式11-13）
  communication:
    hidden_dim: 256                              # 隐藏层维度
    num_heads: 4                                 # 注意力头数
    num_layers: 3                                # Transformer层数
    dropout: 0.0                                 # 论文：移除Dropout
    use_gru: true                                # 论文：使用GRU
    distance_embedding_dim: 64                   # 距离嵌入维度
    comm_radius: 40                              # 通信半径
    use_distance_encoding: true                  # 使用距离编码
    
  # 策略和价值网络配置
  policy:
    hidden_dims: [256, 128]
    activation: "relu"
    
  value:
    hidden_dims: [256, 128]
    activation: "relu"

# MAPPO算法配置（论文标准）
algorithm:
  name: "MAPPO"
  
  # PPO参数
  lr: 3.0e-4                                     # 学习率
  gamma: 0.99                                    # 折扣因子
  gae_lambda: 0.95                               # GAE参数
  clip_param: 0.2                                # PPO裁剪参数
  value_loss_coef: 0.5                           # 价值损失系数
  entropy_coef: 0.01                             # 熵损失系数
  max_grad_norm: 0.5                             # 梯度裁剪
  
  # 训练参数
  num_steps: 256                                 # 每次更新的步数
  num_mini_batch: 8                              # 小批次数量
  ppo_epoch: 4                                   # PPO更新轮数
  
  # 内在奖励参数（论文算法表4）
  use_intrinsic_reward: true
  intrinsic_reward:
    tau: 2.0                                     # 距离阈值
    phi: 0.1                                     # 内在奖励系数
    beta: 0.01                                   # 衰减系数
    buffer_size: 10                              # episode buffer大小

# 训练配置
training:
  total_timesteps: 10000000                      # 论文标准：1000万步
  num_envs: 1                                   # 单环境（论文未明确）
  seed: 42
  device: "cuda"
  
  # 日志和保存
  log_interval: 10                               # 每10个episode记录
  save_interval: 100                             # 每100个episode保存
  eval_interval: 50                              # 每50个episode评估
  eval_episodes: 10
  
  checkpoint_dir: "results/checkpoints"
  log_dir: "results/logs"
  save_best: true
  
  use_tensorboard: true
  use_wandb: false

# 优化配置
optimization:
  use_amp: false
  gradient_accumulation_steps: 1
  use_lr_scheduler: true
  lr_scheduler:
    type: "cosine"
    warmup_steps: 10000
  optimizer: "adam"
  adam_eps: 1.0e-5
  weight_decay: 0.0

# 正则化配置
regularization:
  use_layer_norm: true
  use_residual: true
  clip_observation: true
  normalize_advantage: true
  normalize_observation: false
  normalize_reward: false

