# RMHA优化配置
# 基于论文标准，添加辅助机制帮助训练

# 环境配置（论文标准 + 优化）
env:
  name: "MRPP"
  num_robots: 4                    # 先用4个机器人（比论文的8个少，更容易学习）
  grid_size_range: [10, 20]        # 减小网格范围（10-20，比论文的10-40小）
  obstacle_density_range: [0.0, 0.3]  # 降低障碍物密度（0-30%，比论文的0-50%低）
  obstacle_density_peak: 0.15      # 降低峰值（15%，比论文的33%低）
  fov_size: 3                      # 论文标准：3×3
  max_episode_steps: 256           # 论文标准：256步
  action_space: 5
  
  # 奖励设置（论文标准 + 辅助奖励）
  rewards:
    move: -0.3                     # 论文标准：-0.3
    stay_on_goal: 0.0              # 论文标准：0.0
    stay_off_goal: -0.3            # 论文标准：-0.3
    collision: -2.0                # 论文标准：-2
    blocking: -1.0                 # 论文标准：-1
    reach_goal: 0.0                # 论文标准：0（但可以添加小奖励帮助学习）
    distance_reward: 0.1           # 辅助：基于距离的奖励（每接近目标1步+0.1）

# 模型配置（论文标准）
model:
  name: "RMHA"
  
  encoder:
    conv_channels: [8, 16, 32, 64, 64, 32, 16]  # 7层CNN（论文标准）
    conv_kernels: [3, 3, 3, 3, 3, 3, 3]
    pool_layers: [2, 4]                          # 2层池化
    fc_dims: [256, 256, 256]                     # 3个全连接层
    lstm_hidden_dim: 256                         # LSTM隐藏维度
    
  communication:
    hidden_dim: 256
    num_heads: 4
    num_layers: 3
    dropout: 0.0                                 # 论文：移除Dropout
    use_gru: true                                # 论文：使用GRU
    distance_embedding_dim: 64
    comm_radius: 40
    use_distance_encoding: true
    
  policy:
    hidden_dims: [256, 128]
    activation: "relu"
    
  value:
    hidden_dims: [256, 128]
    activation: "relu"

# MAPPO算法配置（优化）
algorithm:
  name: "MAPPO"
  
  # PPO参数（稍微调整）
  lr: 5.0e-4                                     # 增加学习率（从3e-4到5e-4）
  gamma: 0.99
  gae_lambda: 0.95
  clip_param: 0.2
  value_loss_coef: 0.5
  entropy_coef: 0.02                              # 增加熵系数（从0.01到0.02，鼓励探索）
  max_grad_norm: 0.5
  
  # 训练参数
  num_steps: 256
  num_mini_batch: 8
  ppo_epoch: 4
  
  # 内在奖励参数（优化）
  use_intrinsic_reward: true
  intrinsic_reward:
    tau: 1.5                                      # 降低阈值（从2.0到1.5，更容易获得）
    phi: 0.15                                     # 增加系数（从0.1到0.15）
    beta: 0.01
    buffer_size: 10

# 训练配置
training:
  total_timesteps: 3000000                       # 300万步（约1天）
  num_envs: 1
  seed: 42
  device: "cuda"
  
  log_interval: 10
  save_interval: 50                              # 更频繁保存
  eval_interval: 25
  eval_episodes: 10
  
  checkpoint_dir: "results/checkpoints"
  log_dir: "results/logs"
  save_best: true
  
  use_tensorboard: true
  use_wandb: false

optimization:
  use_amp: false
  gradient_accumulation_steps: 1
  use_lr_scheduler: true
  lr_scheduler:
    type: "cosine"
    warmup_steps: 50000                           # 增加warmup步数
  optimizer: "adam"
  adam_eps: 1.0e-5
  weight_decay: 0.0

regularization:
  use_layer_norm: true
  use_residual: true
  clip_observation: true
  normalize_advantage: true
  normalize_observation: false
  normalize_reward: false

