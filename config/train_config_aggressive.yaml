# RMHA激进优化配置
# 针对成功率0%问题的激进优化方案

# 环境配置（极简 + 激进奖励）
env:
  name: "MRPP"
  num_robots: 2                    # 最少机器人（2个最容易）
  grid_size_range: [6, 8]         # 极小网格（6-8）
  obstacle_density_range: [0.0, 0.05]  # 极低障碍物（0-5%）
  obstacle_density_peak: 0.02     # 极低峰值（2%）
  fov_size: 3
  max_episode_steps: 300           # 增加最大步数（给更多时间）
  action_space: 5
  
  # 奖励设置（激进设计）
  rewards:
    move: 0.0                      # 移除移动惩罚（鼓励探索）
    stay_on_goal: 50.0             # 大幅增加在目标停留奖励
    stay_off_goal: 0.0             # 移除不在目标停留惩罚
    collision: -0.5                # 大幅减少碰撞惩罚
    blocking: -0.1                # 大幅减少阻塞惩罚
    reach_goal: 100.0              # 大幅增加到达目标奖励
    distance_reward: 2.0           # 大幅增加基于距离的奖励（每接近1步+2.0）
    proximity_reward: 1.0          # 新增：基于当前距离的奖励（距离目标越近奖励越高）

# 模型配置（简化 + 优化）
model:
  name: "RMHA"
  
  encoder:
    conv_channels: [8, 16]         # 极简CNN（2层）
    conv_kernels: [3, 3]
    pool_layers: []
    fc_dims: [128]                 # 极简FC（1层）
    lstm_hidden_dim: 128           # 减少LSTM维度
    
  communication:
    hidden_dim: 128                # 减少隐藏维度
    num_heads: 2                    # 减少注意力头
    num_layers: 2                   # 减少Transformer层
    dropout: 0.0
    use_gru: true
    distance_embedding_dim: 32     # 减少距离嵌入维度
    comm_radius: 15                # 减小通信半径
    use_distance_encoding: true
    
  policy:
    hidden_dims: [128, 64]         # 简化策略网络
    activation: "relu"
    
  value:
    hidden_dims: [128, 64]         # 简化价值网络
    activation: "relu"

# MAPPO算法配置（激进优化）
algorithm:
  name: "MAPPO"
  
  # 大幅调整PPO参数
  lr: 2.0e-3                       # 大幅增加学习率（从3e-4到2e-3）
  gamma: 0.99
  gae_lambda: 0.95
  clip_param: 0.2
  value_loss_coef: 0.5
  entropy_coef: 0.2                # 大幅增加熵系数（从0.01到0.2，强烈鼓励探索）
  max_grad_norm: 1.0               # 增加梯度裁剪阈值
  
  # 训练参数
  num_steps: 300                   # 增加每次更新的步数
  num_mini_batch: 4                # 减少小批次（增加批次大小）
  ppo_epoch: 8                     # 增加PPO更新轮数（更多更新）
  
  # 内在奖励参数（激进）
  use_intrinsic_reward: true
  intrinsic_reward:
    tau: 0.5                       # 大幅降低阈值（更容易获得）
    phi: 1.0                       # 大幅增加系数（从0.1到1.0）
    beta: 0.01
    buffer_size: 3                 # 减少buffer大小

# 训练配置
training:
  total_timesteps: 2000000         # 200万步（约1天）
  num_envs: 1
  seed: 42
  device: "cuda"
  
  log_interval: 5                  # 更频繁的日志（每5个episode）
  save_interval: 25                # 更频繁的保存
  eval_interval: 10                # 更频繁的评估
  eval_episodes: 5
  
  checkpoint_dir: "results/checkpoints"
  log_dir: "results/logs"
  save_best: true
  
  use_tensorboard: true
  use_wandb: false

optimization:
  use_amp: false
  gradient_accumulation_steps: 1
  use_lr_scheduler: false           # 禁用学习率调度（保持高学习率）
  optimizer: "adam"
  adam_eps: 1.0e-5
  weight_decay: 0.0

regularization:
  use_layer_norm: true
  use_residual: true
  clip_observation: true
  normalize_advantage: true
  normalize_observation: false
  normalize_reward: true           # 启用奖励归一化（帮助训练）


